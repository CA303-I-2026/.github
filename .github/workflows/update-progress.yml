name: Actualizar progreso en README

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 02:00 UTC, after publish-RepoSense (00:00 UTC)
    - cron: '0 2 * * *'
      timezone: "America/Costa_Rica"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch RepoSense data and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import urllib.request
          import urllib.parse
          import sys

          BASE_URL = "https://raw.githubusercontent.com/CA303-I-2026/publish-RepoSense/gh-pages"
          REPOSENSE_SITE = "https://ca303-i-2026.github.io/publish-RepoSense"
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")

          def fetch_json(url, headers=None):
              try:
                  req = urllib.request.Request(url, headers=headers or {})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read().decode())
              except Exception as e:
                  print(f"Warning: could not fetch {url}: {e}", file=sys.stderr)
                  return None

          def gh_api_headers():
              h = {"Accept": "application/vnd.github.v3+json", "User-Agent": "CA303-progress-tracker"}
              if GITHUB_TOKEN:
                  h["Authorization"] = f"Bearer {GITHUB_TOKEN}"
              return h

          def build_effective_author_map(author_map, daily_map):
              """Return a copy of author_map extended with any daily_map keys absent from it.

              RepoSense may record commits in authorDailyContributionsMap under a
              git-email alias that is not listed in authorDisplayNameMap.  To avoid
              silently dropping those contributions the missing keys are added here
              using the key itself as the display name.
              """
              effective = dict(author_map)
              for k in daily_map:
                  if k not in effective:
                      effective[k] = k
              return effective

          def count_tracked_chars_via_blame(org, repo_name, author_map, daily_map):
              """Count visible (non-whitespace) chars in surviving lines via git blame.

              Clones the repository with a blobless filter and runs:

                  git blame -w --line-porcelain HEAD -- <file>

              for every tracked file at HEAD.  For each surviving line whose commit
              SHA appears in RepoSense's authorDailyContributionsMap (i.e. the commit
              was made during the tracked period), the visible characters of that line
              are attributed to the corresponding author.

              This approach is immune to delete-then-readd inflation: a line is
              counted exactly once regardless of how many times it was removed and
              re-inserted during the period, because only its final surviving state at
              HEAD is measured.  Lines authored outside the tracked period (SHAs not
              in RepoSense data) are silently ignored.

              The -w flag keeps attribution stable across whitespace-only commits
              (indentation, formatting) so that pure-formatting commits cannot be
              used to claim credit.

              - Whitespace characters (spaces, tabs, newlines) are NEVER counted.
              - Files under datos/ are skipped (matches repo-config.csv Ignore Glob).

              Returns: (tracked_per_author: {display_name: int}, total_commits: int)
              """
              import subprocess
              import tempfile
              IGNORED_PREFIXES = ("datos/",)

              effective_author_map = build_effective_author_map(author_map, daily_map)

              # Collect commit SHAs with first-seen author attribution
              sha_author = {}
              for username in effective_author_map:
                  for day in daily_map.get(username, []):
                      if not isinstance(day, dict):
                          continue
                      for cr in day.get("commitResults", []):
                          sha = cr.get("hash", "")
                          if sha and sha not in sha_author:
                              sha_author[sha] = username

              char_counts = {u: 0 for u in effective_author_map}
              total_commits = len(sha_author)

              if not sha_author:
                  return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, 0

              clone_url = f"https://github.com/{org}/{repo_name}.git"
              # Inject credentials via git config environment variables so the token
              # never appears in command-line arguments or captured stderr output.
              clone_env = dict(os.environ)
              if GITHUB_TOKEN:
                  import base64
                  b64 = base64.b64encode(
                      f"x-access-token:{GITHUB_TOKEN}".encode()
                  ).decode()
                  clone_env.update({
                      "GIT_CONFIG_COUNT": "1",
                      "GIT_CONFIG_KEY_0": "http.https://github.com/.extraheader",
                      "GIT_CONFIG_VALUE_0": f"AUTHORIZATION: basic {b64}",
                  })

              with tempfile.TemporaryDirectory() as tmpdir:
                  try:
                      clone_result = subprocess.run(
                          ["git", "clone", "--filter=blob:none", clone_url, tmpdir],
                          capture_output=True, timeout=120, env=clone_env,
                      )
                  except subprocess.TimeoutExpired:
                      print(f"Warning: clone of {org}/{repo_name} timed out", file=sys.stderr)
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits
                  except Exception as e:
                      print(f"Warning: clone of {org}/{repo_name} failed: {e}", file=sys.stderr)
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits
                  if clone_result.returncode != 0:
                      print(
                          f"Warning: could not clone {org}/{repo_name}: "
                          f"{clone_result.stderr.decode(errors='replace').strip()}",
                          file=sys.stderr,
                      )
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits

                  # List all tracked files present at HEAD
                  ls_result = subprocess.run(
                      ["git", "-C", tmpdir, "ls-files", "--",
                       "*.qmd", "*.tex", "*.R", "*.py", "*.cpp"],
                      capture_output=True, encoding="utf-8", errors="replace", timeout=30,
                  )
                  if ls_result.returncode != 0 or not ls_result.stdout.strip():
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits

                  files = [
                      f for f in ls_result.stdout.splitlines()
                      if f and not any(f.startswith(p) for p in IGNORED_PREFIXES)
                  ]

                  for filepath in files:
                      try:
                          blame_result = subprocess.run(
                              ["git", "-C", tmpdir, "blame", "-w",
                               "--line-porcelain", "HEAD", "--", filepath],
                              capture_output=True,
                              encoding="utf-8", errors="replace", timeout=60,
                              env=clone_env,
                          )
                          if blame_result.returncode != 0:
                              print(
                                  f"Warning: git blame {filepath} failed: "
                                  f"{blame_result.stderr.strip()}",
                                  file=sys.stderr,
                              )
                              continue
                          current_sha = None
                          for line in blame_result.stdout.splitlines():
                              # Blame porcelain: commit header line is
                              # "<40-hex-sha> <orig> <final> [<count>]"; boundary
                              # commits may be prefixed with "^", and uncommitted
                              # content may use the all-zero SHA.
                              header = line
                              if header.startswith("^"):
                                  header = header[1:]
                              if (len(header) >= 40
                                      and all(c in "0123456789abcdef" for c in header[:40])
                                      and (len(header) == 40 or header[40] == " ")):
                                  candidate_sha = header[:40]
                                  # Ignore the special all-zero SHA used for
                                  # uncommitted content.
                                  if candidate_sha != "0" * 40:
                                      current_sha = candidate_sha
                                  else:
                                      current_sha = None
                              elif line.startswith("\t"):
                                  if current_sha and current_sha in sha_author:
                                      content = line[1:]
                                      char_counts[sha_author[current_sha]] += sum(
                                          1 for c in content if not c.isspace()
                                      )
                      except subprocess.TimeoutExpired:
                          print(f"Warning: git blame {filepath} timed out", file=sys.stderr)
                      except Exception as e:
                          print(f"Warning: git blame {filepath} error: {e}", file=sys.stderr)

              tracked_per_author = {effective_author_map[u]: char_counts[u] for u in effective_author_map}
              return tracked_per_author, total_commits

          def count_insertions(author_daily_map):
              total = 0
              for daily_list in author_daily_map.values():
                  for day in daily_list:
                      if isinstance(day, dict):
                          for cr in day.get("commitResults", []):
                              for ft in cr.get("fileTypesAndContributionMap", {}).values():
                                  total += ft.get("insertions", 0)
              return total

          summary = fetch_json(f"{BASE_URL}/summary.json")
          if summary is None:
              print("ERROR: could not fetch summary.json", file=sys.stderr)
              sys.exit(1)

          generated_time = summary.get("reportGeneratedTime", "N/A")
          since = summary.get("sinceDate", "")[:10]
          until = summary.get("untilDate", "")[:10]
          repos = summary.get("repos", [])

          rows = []
          for repo in repos:
              folder = repo["outputFolderName"]
              group_name = repo["location"]["repoName"]
              org = repo["location"]["organization"]
              repo_url = f"https://github.com/{org}/{group_name}"

              commits_data = fetch_json(f"{BASE_URL}/{folder}/commits.json")
              if commits_data:
                  author_map = commits_data.get("authorDisplayNameMap", {})
                  daily_map = commits_data.get("authorDailyContributionsMap", {})
                  members = list(build_effective_author_map(author_map, daily_map).values())
                  num_insertions = count_insertions(daily_map)
                  # Character-level changes in tracked files (visible chars only, whitespace excluded)
                  tracked_per_author, num_commits = count_tracked_chars_via_blame(
                      org, group_name, author_map, daily_map
                  )
              else:
                  members = []
                  num_commits = 0
                  num_insertions = 0
                  tracked_per_author = {}

              rows.append({
                  "group": group_name,
                  "repo_url": repo_url,
                  "members": members,
                  "commits": num_commits,
                  "insertions": num_insertions,
                  "tracked_per_author": tracked_per_author,
              })

          # ── Section 1: overall progress table ──────────────────────────────────
          lines = [
              "<!-- REPOSENSE-PROGRESS-START -->",
              "## 📊 Progreso de los grupos",
              "",
              f"> Período: **{since}** → **{until}** · Reporte generado: **{generated_time}**",
              f"> Fuente: [RepoSense Report]({REPOSENSE_SITE})",
              "",
              "| Grupo | Repositorio | Integrantes | Commits | Líneas añadidas |",
              "|-------|-------------|-------------|:-------:|:---------------:|",
          ]

          for row in rows:
              members_str = "<br>".join(row["members"]) if row["members"] else "—"
              lines.append(
                  f"| [{row['group']}]({row['repo_url']}) "
                  f"| [🔗 Ver repo]({row['repo_url']}) "
                  f"| {members_str} "
                  f"| {row['commits']} "
                  f"| {row['insertions']} |"
              )

          lines.append("<!-- REPOSENSE-PROGRESS-END -->")
          progress_block = "\n".join(lines)

          # ── Section 2: per-group QMD tables + competition ranking ────────────
          import math

          def balance_stddev(tracked_map):
              """Population std-dev of member percentage shares (σ).
              Returns None when group has no tracked activity."""
              total = sum(tracked_map.values())
              if total == 0 or len(tracked_map) == 0:
                  return None
              n = len(tracked_map)
              mean_pct = 100.0 / n          # expected percentage per member under equal distribution
              pcts = [v / total * 100 for v in tracked_map.values()]
              return math.sqrt(sum((p - mean_pct) ** 2 for p in pcts) / n)

          def chi_square_balance(tracked_map):
              """Chi-squared goodness-of-fit statistic for equal contribution (H0).
              χ² = Σ (Oᵢ − E)² / E  where E = total / n.
              Returns (stat, df) or (None, None) when no activity / fewer than 2 members."""
              total = sum(tracked_map.values())
              n = len(tracked_map)
              if total == 0 or n < 2:
                  return None, None
              expected = total / n
              stat = sum((obs - expected) ** 2 / expected for obs in tracked_map.values())
              return stat, n - 1

          def _gammainc_lower_series(a, x, max_iter=300, tol=1e-12):
              """Lower regularized incomplete gamma P(a,x) via series expansion."""
              if abs(x) < 1e-15:
                  return 0.0
              term = 1.0 / a
              total = term
              for n in range(1, max_iter + 1):
                  term *= x / (a + n)
                  total += term
                  if abs(term) < tol * abs(total):
                      break
              return math.exp(-x + a * math.log(x) - math.lgamma(a + 1)) * total

          def _gammaincc_cf(a, x, max_iter=300, tol=1e-12):
              """Upper regularized incomplete gamma Q(a,x) via Lentz continued fraction."""
              TINY = 1e-30
              b = x + 1.0 - a
              c = 1.0 / TINY
              d = 1.0 / (b if abs(b) > TINY else TINY)
              h = d
              for i in range(1, max_iter + 1):
                  an = -i * (i - a)
                  b += 2.0
                  d = an * d + b
                  if abs(d) < TINY: d = TINY
                  c = b + an / c
                  if abs(c) < TINY: c = TINY
                  d = 1.0 / d
                  delta = d * c
                  h *= delta
                  if abs(delta - 1.0) < tol:
                      break
              return math.exp(-x + a * math.log(x) - math.lgamma(a)) * h

          def chi2_pvalue(stat, df):
              """Upper-tail p-value: P(χ² > stat | df) using pure Python."""
              if stat is None or df is None or df < 1:
                  return None
              if stat < 1e-15:
                  return 1.0
              a = df / 2.0
              x = stat / 2.0
              if x < a + 1.0:
                  return 1.0 - _gammainc_lower_series(a, x)
              return _gammaincc_cf(a, x)

          qmd_lines = [
              "<!-- REPOSENSE-QMD-START -->",
              "## 📝 Caracteres modificados en archivos de proyecto por integrante",
              "",
              f"> Período: **{since}** → **{until}** · Reporte generado: **{generated_time}**",
              f"> Archivos rastreados: `.qmd`, `.tex`, `.R`, `.py`, `.cpp` · Métrica: caracteres visibles en líneas supervivientes atribuidas al integrante (git blame)",
              "",
          ]

          for row in rows:
              tracked_map = row["tracked_per_author"]
              group_total = sum(tracked_map.values())

              qmd_lines.append(f"### {row['group']}")
              qmd_lines.append("")
              qmd_lines.append("| Integrante | Caracteres | Caracteres % |")
              qmd_lines.append("|------------|:----------:|:------------:|")

              for name, count in tracked_map.items():
                  pct_str = f"{count/group_total*100:.1f}%" if group_total > 0 else "—"
                  qmd_lines.append(f"| {name} | {count} | {pct_str} |")

              qmd_lines.append("")

          # ── Competition ranking ────────────────────────────────────────────────
          # Compute per-group stats
          group_stats = []
          for row in rows:
              tracked_map = row["tracked_per_author"]
              total_tracked = sum(tracked_map.values())
              chi2_stat, chi2_df = chi_square_balance(tracked_map)
              pvalue = chi2_pvalue(chi2_stat, chi2_df)
              group_stats.append({
                  "group": row["group"],
                  "repo_url": row["repo_url"],
                  "total_tracked": total_tracked,
                  "sigma": balance_stddev(tracked_map),
                  "chi2": chi2_stat,
                  "chi2_df": chi2_df,
                  "pvalue": pvalue,
                  "rank_total": None,
                  "rank_sigma": None,
                  "rank_chi2": None,
                  "score": None,
              })

          active = [g for g in group_stats if g["total_tracked"] > 0]
          inactive = [g for g in group_stats if g["total_tracked"] == 0]
          n_active = len(active)
          last_rank = n_active + 1

          for rank, g in enumerate(sorted(active, key=lambda x: -x["total_tracked"]), 1):
              g["rank_total"] = rank
          for rank, g in enumerate(sorted(active, key=lambda x: x["sigma"]), 1):
              g["rank_sigma"] = rank
          for rank, g in enumerate(sorted(active, key=lambda x: x["chi2"]), 1):
              g["rank_chi2"] = rank
          for g in inactive:
              for key in ("rank_total", "rank_sigma", "rank_chi2"):
                  g[key] = last_rank

          for g in group_stats:
              # Primary score: volume rank + σ-balance rank (lower = better).
              # χ² rank is shown as an independent cross-check.
              g["score"] = (g["rank_total"] + g["rank_sigma"]) if g["total_tracked"] > 0 else float("inf")

          # Tie-breaker: at equal score, the group with lower σ (more balanced
          # contributions) wins, favouring teams whose members work more evenly.
          ranked = sorted(group_stats, key=lambda x: (x["score"], x["sigma"] if x["sigma"] is not None else float("inf")))
          winner_id = ranked[0]["group"] if ranked and ranked[0]["total_tracked"] > 0 else None

          qmd_lines.append("### 🏆 Grupo ganador de puntos extra (5 puntos para cada integrante)")
          qmd_lines.append("")
          qmd_lines.append(
              "> **Criterio de victoria**: El equipo que tenga al final del semestre el mayor total de "
              "**caracteres visibles en líneas supervivientes** (git blame sobre archivos `.qmd`, `.tex`, `.R`, `.py` y `.cpp` al HEAD, "
              "contando solo líneas cuyo último commit fue realizado durante el período) "
              "**y** distribución más equilibrada entre sus integrantes. "
              "Solo se mide lo que permanece en el repositorio; borrar y reinsertar código no infla el conteo.  ")
          qmd_lines.append(
              "> **Puntaje** = Rango volumen + Rango σ (menor = mejor). "
              "Las columnas χ² y p-valor son métricas independientes de verificación.  ")
          qmd_lines.append("> 🏆 indica el grupo ganador.")
          qmd_lines.append("")
          qmd_lines.append("**IMPORTANTE:** Para ganar esto hay que tener constancia. Un grupo en el cual un solo integrante tiene 100% durante 3 meses, será muy difícil que gane, ya que el resto del equipo tendrá que recuperar la cantidad de líneas en el último mes.")
          qmd_lines.append("")
          qmd_lines.append("")
          qmd_lines.append("**El truco para ganar es mantenerse en los primeros lugares durante todo el semestre**.")
          qmd_lines.append("")
          qmd_lines.append("")
          qmd_lines.append(
              "| Pos. | Grupo | Total caracteres | Rango vol. | σ balance | Rango σ | χ² bondad | p-valor | Rango χ² | Puntaje | |"
          )
          qmd_lines.append(
              "|:----:|-------|:----------------:|:----------:|:---------:|:-------:|:---------:|:-------:|:--------:|:-------:|:-:|"
          )

          medals = {1: "🥇", 2: "🥈", 3: "🥉"}
          for pos, g in enumerate(ranked, 1):
              medal = medals.get(pos, str(pos))
              is_winner = winner_id is not None and g["group"] == winner_id
              trophy = "🏆" if is_winner else ""
              sigma_str = f"{g['sigma']:.2f}" if g["sigma"] is not None else "—"
              chi2_str  = f"{g['chi2']:.2f}"  if g["chi2"]  is not None else "—"
              pval = g["pvalue"]
              if pval is None:
                  pval_str = "—"
              elif pval < 0.001:
                  pval_str = f"{pval:.2e}"
              else:
                  pval_str = f"{pval:.3f}"
              rank_t  = str(g["rank_total"]) if g["rank_total"] != last_rank else "—"
              rank_s  = str(g["rank_sigma"]) if g["rank_sigma"] != last_rank else "—"
              rank_c  = str(g["rank_chi2"])  if g["rank_chi2"]  != last_rank else "—"
              score_str = str(g["score"]) if g["score"] != float("inf") else "—"
              qmd_lines.append(
                  f"| {medal} | [{g['group']}]({g['repo_url']}) "
                  f"| {g['total_tracked']} "
                  f"| {rank_t} "
                  f"| {sigma_str} "
                  f"| {rank_s} "
                  f"| {chi2_str} "
                  f"| {pval_str} "
                  f"| {rank_c} "
                  f"| {score_str} "
                  f"| {trophy} |"
              )

          qmd_lines.append("")
          qmd_lines.append("---")
          qmd_lines.append("")
          qmd_lines.append("#### 🗺️ Guía de columnas")
          qmd_lines.append("")
          qmd_lines.append(
              "La siguiente tabla explica cada columna del ranking para que puedas "
              "interpretar exactamente cómo fue evaluado tu grupo.")
          qmd_lines.append("")
          qmd_lines.append("| Columna | Qué mide | Cómo leerla | Mejor valor |")
          qmd_lines.append("|---------|----------|-------------|-------------|")
          qmd_lines.append(
              "| **Pos.** | Posición final en el ranking (🥇🥈🥉…) | "
              "Determinada por el Puntaje; a igual Puntaje gana el grupo con menor σ balance (distribución más equilibrada entre sus integrantes) | "
              "🥇 (posición 1) |")
          qmd_lines.append(
              "| **Grupo** | Nombre del grupo con enlace al repositorio | "
              "Clic para ver el repo directamente | — |")
          qmd_lines.append(
              "| **Total caracteres** | Suma de caracteres visibles (no-espacios) en las líneas supervivientes al HEAD de los archivos `.qmd`, `.tex`, `.R`, `.py` y `.cpp`, cuyo último commit fue realizado durante el período (git blame). Solo cuenta lo que permanece en el repo. | Más caracteres = mayor volumen de trabajo visible | Mayor |")
          qmd_lines.append(
              "| **Rango vol.** | Posición del grupo ordenado de mayor a menor Total caracteres | "
              "1 = grupo con más caracteres visibles supervivientes; — = grupo sin actividad | 1 |")
          qmd_lines.append(
              "| **σ balance** | Desviación estándar de los porcentajes de contribución de cada integrante | "
              "0 = todos aportaron exactamente lo mismo; valores mayores indican mayor desequilibrio | 0 |")
          qmd_lines.append(
              "| **Rango σ** | Posición del grupo ordenado de menor a mayor σ (más equilibrado primero) | "
              "1 = distribución más igualitaria; — = grupo sin actividad | 1 |")
          qmd_lines.append(
              "| **χ² bondad** | Estadístico chi-cuadrado de bondad de ajuste (H₀: distribución uniforme) | "
              "0 = aporte perfectamente igualitario; valores altos indican desequilibrio. "
              "**Ojo:** no es comparable entre grupos de diferente volumen total | 0 |")
          qmd_lines.append(
              "| **p-valor** | Probabilidad de observar un χ² tan extremo o mayor si el reparto fuera uniforme | "
              "p > 0.05 → no se rechaza H₀ (equilibrado); "
              "p ≤ 0.05 → evidencia de desequilibrio; "
              "p ≤ 0.01 → evidencia fuerte; "
              "p ≤ 0.001 → evidencia muy fuerte | > 0.05 |")
          qmd_lines.append(
              "| **Rango χ²** | Posición del grupo ordenado de menor a mayor χ² (más equilibrado primero) | "
              "Métrica de verificación independiente; idealmente coincide con Rango σ | 1 |")
          qmd_lines.append(
              "| **Puntaje** | Rango vol. + Rango σ | "
              "Combina volumen y equilibrio en un único número; **menor = mejor**; — = sin actividad | Menor |")
          qmd_lines.append(
              "| **🏆** | Grupo ganador | "
              "Se otorga al grupo con el menor Puntaje (y, en caso de empate, menor σ balance) | 🏆 |")
          qmd_lines.append("")
          qmd_lines.append(
              "> **Nota sobre `—`:** el guion indica que el grupo no tiene líneas supervivientes atribuidas en archivos "
              "`.qmd`, `.tex`, `.R`, `.py` o `.cpp` durante el período analizado y por tanto no participa en el ranking de volumen ni balance.")
          qmd_lines.append("")
          qmd_lines.append("---")
          qmd_lines.append("")
          qmd_lines.append("#### 📐 Metodología de las métricas de equilibrio")
          qmd_lines.append("")
          qmd_lines.append(
              "Se utilizan **dos métricas independientes** para medir cuán equitativamente "
              "cada grupo reparte las contribuciones entre sus integrantes. "
              "Ambas tienen como hipótesis nula que todos los miembros aportan exactamente "
              "la misma cantidad de **caracteres visibles en líneas supervivientes** en archivos `.qmd`, `.tex`, `.R`, `.py` y `.cpp` "
              "(espacios en blanco excluidos).")
          qmd_lines.append("")
          qmd_lines.append("**0. Definición de Oᵢ — conteo de caracteres visibles supervivientes (git blame)**")
          qmd_lines.append("")
          qmd_lines.append(
              "El repositorio se clona localmente con filtro blobless y se ejecuta "
              "`git blame --line-porcelain HEAD` sobre cada archivo rastreado. "
              "Por cada línea del estado final del archivo (HEAD), git blame reporta el SHA del último commit "
              "que modificó esa línea. Si ese SHA aparece en los datos de RepoSense del período, "
              "los caracteres visibles (no-espacios) de esa línea se acreditan al integrante correspondiente. "
              "Las líneas cuyo último commit es anterior al período no se cuentan. "
              "Caracteres contabilizados:")
          qmd_lines.append("")
          qmd_lines.append(
              "- **Por línea superviviente**: número de chars no-espacios (no space, no tab, no newline) "
              "en el contenido de la línea tal como existe en HEAD.")
          qmd_lines.append("")
          qmd_lines.append(
              "Oᵢ es la suma de caracteres visibles de todas las líneas supervivientes atribuidas al "
              "integrante en los archivos rastreados. Un ciclo de borrar-y-reinsertar el mismo texto "
              "produce exactamente la misma Oᵢ que no haberlo tocado, eliminando el incentivo de "
              "inflar el conteo artificialmente.")
          qmd_lines.append("")
          qmd_lines.append("**1. Desviación estándar de porcentajes (σ)**")
          qmd_lines.append("")
          qmd_lines.append(
              "Convierte los conteos de caracteres visibles supervivientes (`.qmd` + `.tex` + `.R` + `.py` + `.cpp`) en porcentajes "
              "(pᵢ = Oᵢ / T × 100) "
              "y calcula la desviación estándar poblacional respecto a la media teórica "
              "de contribución igualitaria (100 / n):")
          qmd_lines.append("")
          qmd_lines.append(
              "$$\\sigma = \\sqrt{\\frac{1}{n}\\sum_{i=1}^{n}\\left(p_i - \\frac{100}{n}\\right)^2}$$")
          qmd_lines.append("")
          qmd_lines.append(
              "σ = 0 significa contribución perfectamente igualitaria; "
              "σ = 100 · (n−1)/n · 1/√n corresponde al caso extremo donde un solo integrante "
              "hace todo el trabajo. **Menor σ = mejor equilibrio.**")
          qmd_lines.append("")
          qmd_lines.append("**2. Prueba chi-cuadrado de bondad de ajuste (χ²)**")
          qmd_lines.append("")
          qmd_lines.append(
              "Compara los conteos observados de caracteres visibles (Oᵢ) contra los esperados bajo distribución "
              "uniforme (E = T / n, donde T = total de caracteres del grupo y n = número de integrantes):")
          qmd_lines.append("")
          qmd_lines.append(
              "$$\\chi^2 = \\sum_{i=1}^{n}\\frac{(O_i - E)^2}{E}, \\quad E = \\frac{T}{n}, \\quad gl = n-1$$")
          qmd_lines.append("")
          qmd_lines.append(
              "El **p-valor** es la probabilidad de observar un estadístico tan extremo o más "
              "asumiendo H₀ (distribución uniforme): "
              "p = P(χ² > estadístico | gl). "
              "Se calcula mediante la función gamma incompleta superior regularizada Q(gl/2, estadístico/2):")
          qmd_lines.append("")
          qmd_lines.append(
              "$$p = Q\\!\\left(\\frac{gl}{2},\\,\\frac{\\chi^2}{2}\\right) "
              "= \\frac{\\Gamma(gl/2,\\;\\chi^2/2)}{\\Gamma(gl/2)}$$")
          qmd_lines.append("")
          qmd_lines.append(
              "**Interpretación del p-valor:** p > 0.05 no rechaza H₀ (distribución equilibrada); "
              "p ≤ 0.05 indica evidencia de desequilibrio. "
              "χ² = 0 indica distribución perfectamente igualitaria. "
              "A diferencia de σ, χ² **no** está normalizado por el volumen total, "
              "por lo que grupos con más caracteres en total pueden obtener χ² más alto "
              "aunque su distribución sea más equilibrada en términos relativos. "
              "El p-valor corrige parcialmente este sesgo al escalar internamente por E. "
              "Por eso ambas (χ², p-valor) se usan como **verificación independiente** y no como métrica principal. "
              "**Menor χ² (mayor p-valor) = mejor equilibrio** (dentro del mismo tamaño de grupo).")
          qmd_lines.append("")
          qmd_lines.append(
              "**Combinación de rangos:** El puntaje final es "
              "`Rango vol. + Rango σ`. Si el Rango χ² coincide con el Rango σ "
              "y el p-valor confirma rechazo/aceptación de H₀, "
              "el resultado queda verificado por ambas métricas. "
              "**Desempate:** si dos grupos tienen el mismo Puntaje, gana el que tenga menor σ (menor dispersión de contribuciones), "
              "favoreciendo así a los equipos cuyos integrantes trabajan de forma más equilibrada.")
          qmd_lines.append("")
          qmd_lines.append("<!-- REPOSENSE-QMD-END -->")
          qmd_block = "\n".join(qmd_lines)

          # ── Write both sections to README ──────────────────────────────────────
          readme_path = "README.md"
          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          def replace_or_append(text, start_marker, end_marker, new_block):
              s = text.find(start_marker)
              e = text.find(end_marker)
              if s != -1 and e != -1:
                  return text[:s] + new_block + text[e + len(end_marker):]
              return text.rstrip("\n") + "\n\n" + new_block + "\n"

          content = replace_or_append(
              content,
              "<!-- REPOSENSE-PROGRESS-START -->",
              "<!-- REPOSENSE-PROGRESS-END -->",
              progress_block,
          )
          content = replace_or_append(
              content,
              "<!-- REPOSENSE-QMD-START -->",
              "<!-- REPOSENSE-QMD-END -->",
              qmd_block,
          )

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(content)

          # ── Write full ranking block to profile/README.md ─────────────────────
          import os
          os.makedirs("profile", exist_ok=True)

          # Reuse the full qmd_block, replacing its markers with the profile markers
          # so that the complete ranking, column guide and methodology appear on the
          # organisation profile page.
          profile_block = (
              qmd_block
              .replace("<!-- REPOSENSE-QMD-START -->", "<!-- REPOSENSE-PROFILE-START -->", 1)
              .replace("<!-- REPOSENSE-QMD-END -->",   "<!-- REPOSENSE-PROFILE-END -->",   1)
          )

          profile_path = "profile/README.md"
          with open(profile_path, "r", encoding="utf-8") as f:
              profile_content = f.read()
          profile_content = replace_or_append(
              profile_content,
              "<!-- REPOSENSE-PROFILE-START -->",
              "<!-- REPOSENSE-PROFILE-END -->",
              profile_block,
          )
          with open(profile_path, "w", encoding="utf-8") as f:
              f.write(profile_content)

          print("README.md and profile/README.md updated successfully.")
          EOF

      - name: Commit and push changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md profile/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: actualizar progreso de grupos [skip ci]"
            git pull --rebase origin main
            git push
          fi
