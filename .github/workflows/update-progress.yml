name: Actualizar progreso en README

on:
  schedule:
    # Runs daily at 02:00 UTC, after publish-RepoSense (00:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch RepoSense data and update README
        run: |
          python3 - <<'EOF'
          import json
          import urllib.request
          import sys

          BASE_URL = "https://raw.githubusercontent.com/CA303-I-2026/publish-RepoSense/gh-pages"
          REPOSENSE_SITE = "https://ca303-i-2026.github.io/publish-RepoSense"

          def fetch_json(url):
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      return json.loads(r.read().decode())
              except Exception as e:
                  print(f"Warning: could not fetch {url}: {e}", file=sys.stderr)
                  return None

          def count_commits(author_daily_map):
              total = 0
              for daily_list in author_daily_map.values():
                  for day in daily_list:
                      if isinstance(day, dict):
                          total += len(day.get("commitResults", []))
              return total

          def count_insertions(author_daily_map):
              total = 0
              for daily_list in author_daily_map.values():
                  for day in daily_list:
                      if isinstance(day, dict):
                          for cr in day.get("commitResults", []):
                              for ft in cr.get("fileTypesAndContributionMap", {}).values():
                                  total += ft.get("insertions", 0)
              return total

          summary = fetch_json(f"{BASE_URL}/summary.json")
          if summary is None:
              print("ERROR: could not fetch summary.json", file=sys.stderr)
              sys.exit(1)

          generated_time = summary.get("reportGeneratedTime", "N/A")
          since = summary.get("sinceDate", "")[:10]
          until = summary.get("untilDate", "")[:10]
          repos = summary.get("repos", [])

          rows = []
          for repo in repos:
              folder = repo["outputFolderName"]
              group_name = repo["location"]["repoName"]
              org = repo["location"]["organization"]
              repo_url = f"https://github.com/{org}/{group_name}"

              commits_data = fetch_json(f"{BASE_URL}/{folder}/commits.json")
              if commits_data:
                  author_map = commits_data.get("authorDisplayNameMap", {})
                  daily_map = commits_data.get("authorDailyContributionsMap", {})
                  ft_map = commits_data.get("authorFileTypeContributionMap", {})
                  members = list(author_map.values())
                  num_commits = count_commits(daily_map)
                  num_insertions = count_insertions(daily_map)
                  # QMD lines per author: authorFileTypeContributionMap[username]["qmd"]
                  qmd_per_author = {
                      author_map[u]: ft_map.get(u, {}).get("qmd", 0)
                      for u in author_map
                  }
              else:
                  members = []
                  num_commits = 0
                  num_insertions = 0
                  qmd_per_author = {}

              rows.append({
                  "group": group_name,
                  "repo_url": repo_url,
                  "members": members,
                  "commits": num_commits,
                  "insertions": num_insertions,
                  "qmd_per_author": qmd_per_author,
              })

          # ── Section 1: overall progress table ──────────────────────────────────
          lines = [
              "<!-- REPOSENSE-PROGRESS-START -->",
              "## 📊 Progreso de los grupos",
              "",
              f"> Período: **{since}** → **{until}** · Reporte generado: **{generated_time}**",
              f"> Fuente: [RepoSense Report]({REPOSENSE_SITE})",
              "",
              "| Grupo | Repositorio | Integrantes | Commits | Líneas añadidas |",
              "|-------|-------------|-------------|:-------:|:---------------:|",
          ]

          for row in rows:
              members_str = "<br>".join(row["members"]) if row["members"] else "—"
              lines.append(
                  f"| [{row['group']}]({row['repo_url']}) "
                  f"| [🔗 Ver repo]({row['repo_url']}) "
                  f"| {members_str} "
                  f"| {row['commits']} "
                  f"| {row['insertions']} |"
              )

          lines.append("<!-- REPOSENSE-PROGRESS-END -->")
          progress_block = "\n".join(lines)

          # ── Section 2: per-group QMD tables + competition ranking ────────────
          import math

          def balance_stddev(qmd_map):
              """Std-dev of member percentage shares (0 = perfect balance, None = no activity)."""
              total = sum(qmd_map.values())
              if total == 0 or len(qmd_map) == 0:
                  return None
              n = len(qmd_map)
              mean_pct = 100.0 / n
              pcts = [v / total * 100 for v in qmd_map.values()]
              return math.sqrt(sum((p - mean_pct) ** 2 for p in pcts) / n)

          qmd_lines = [
              "<!-- REPOSENSE-QMD-START -->",
              "## 📝 Cambios en archivos `.qmd` por integrante",
              "",
              f"> Período: **{since}** → **{until}** · Reporte generado: **{generated_time}**",
              "",
          ]

          for row in rows:
              qmd_map = row["qmd_per_author"]
              group_total = sum(qmd_map.values())

              qmd_lines.append(f"### {row['group']}")
              qmd_lines.append("")
              qmd_lines.append("| Integrante | Cambios (líneas `.qmd`) | Cambios % |")
              qmd_lines.append("|------------|:-----------------------:|:---------:|")

              for name, count in qmd_map.items():
                  pct_str = f"{count/group_total*100:.1f}%" if group_total > 0 else "—"
                  qmd_lines.append(f"| {name} | {count} | {pct_str} |")

              qmd_lines.append("")

          # ── Competition ranking ────────────────────────────────────────────────
          # Compute per-group stats
          group_stats = []
          for row in rows:
              qmd_map = row["qmd_per_author"]
              total_qmd = sum(qmd_map.values())
              bal = balance_stddev(qmd_map)
              group_stats.append({
                  "group": row["group"],
                  "repo_url": row["repo_url"],
                  "total_qmd": total_qmd,
                  "balance": bal,
                  "rank_total": None,
                  "rank_balance": None,
                  "score": None,
              })

          active = [g for g in group_stats if g["total_qmd"] > 0]
          inactive = [g for g in group_stats if g["total_qmd"] == 0]
          n_active = len(active)
          last_rank = n_active + 1

          for rank, g in enumerate(sorted(active, key=lambda x: -x["total_qmd"]), 1):
              g["rank_total"] = rank
          for rank, g in enumerate(sorted(active, key=lambda x: x["balance"]), 1):
              g["rank_balance"] = rank
          for g in inactive:
              g["rank_total"] = last_rank
              g["rank_balance"] = last_rank

          for g in group_stats:
              # Only active groups (total_qmd > 0) get a numeric score
              g["score"] = (g["rank_total"] + g["rank_balance"]) if g["total_qmd"] > 0 else float("inf")

          ranked = sorted(group_stats, key=lambda x: (x["score"], -x["total_qmd"]))
          winner_score = ranked[0]["score"] if ranked and ranked[0]["total_qmd"] > 0 else None

          qmd_lines.append("### 🏆 Competencia entre grupos")
          qmd_lines.append("")
          qmd_lines.append(
              "> **Criterio de victoria**: mayor total de cambios `.qmd` "
              "**y** distribución más equilibrada entre integrantes.  ")
          qmd_lines.append(
              "> El puntaje combina el rango en cambios totales y el rango en equilibrio "
              "(σ de porcentajes de cada miembro — menor σ = más equilibrado).  ")
          qmd_lines.append("> Menor puntaje = mejor posición. 🏆 indica el grupo ganador.")
          qmd_lines.append("")
          qmd_lines.append(
              "| Pos. | Grupo | Total `.qmd` | Rango cambios | Equilibrio (σ pp) | Rango equilibrio | Puntaje | |"
          )
          qmd_lines.append(
              "|:----:|-------|:------------:|:-------------:|:-----------------:|:----------------:|:-------:|:-:|"
          )

          medals = {1: "🥇", 2: "🥈", 3: "🥉"}
          for pos, g in enumerate(ranked, 1):
              medal = medals.get(pos, str(pos))
              is_winner = winner_score is not None and g["score"] == winner_score and g["total_qmd"] > 0
              trophy = "🏆" if is_winner else ""
              bal_str = f"{g['balance']:.1f}" if g["balance"] is not None else "—"
              rank_t = str(g["rank_total"]) if g["rank_total"] != last_rank else "—"
              rank_b = str(g["rank_balance"]) if g["rank_balance"] != last_rank else "—"
              score_str = str(g["score"]) if g["score"] != float("inf") else "—"
              qmd_lines.append(
                  f"| {medal} | [{g['group']}]({g['repo_url']}) "
                  f"| {g['total_qmd']} "
                  f"| {rank_t} "
                  f"| {bal_str} "
                  f"| {rank_b} "
                  f"| {score_str} "
                  f"| {trophy} |"
              )

          qmd_lines.append("")
          qmd_lines.append("<!-- REPOSENSE-QMD-END -->")
          qmd_block = "\n".join(qmd_lines)

          # ── Write both sections to README ──────────────────────────────────────
          readme_path = "README.md"
          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          def replace_or_append(text, start_marker, end_marker, new_block):
              s = text.find(start_marker)
              e = text.find(end_marker)
              if s != -1 and e != -1:
                  return text[:s] + new_block + text[e + len(end_marker):]
              return text.rstrip("\n") + "\n\n" + new_block + "\n"

          content = replace_or_append(
              content,
              "<!-- REPOSENSE-PROGRESS-START -->",
              "<!-- REPOSENSE-PROGRESS-END -->",
              progress_block,
          )
          content = replace_or_append(
              content,
              "<!-- REPOSENSE-QMD-START -->",
              "<!-- REPOSENSE-QMD-END -->",
              qmd_block,
          )

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(content)

          print("README.md updated successfully.")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: actualizar progreso de grupos [skip ci]"
            git push
          fi
