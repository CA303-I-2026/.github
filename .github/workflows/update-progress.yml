name: Actualizar progreso en README

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 02:00 UTC, after publish-RepoSense (00:00 UTC)
    - cron: '0 2 * * *'
      timezone: "America/Costa_Rica"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch RepoSense data and update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import urllib.request
          import urllib.parse
          import sys

          BASE_URL = "https://raw.githubusercontent.com/CA303-I-2026/publish-RepoSense/gh-pages"
          REPOSENSE_SITE = "https://ca303-i-2026.github.io/publish-RepoSense"
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")

          def fetch_json(url, headers=None):
              try:
                  req = urllib.request.Request(url, headers=headers or {})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read().decode())
              except Exception as e:
                  print(f"Warning: could not fetch {url}: {e}", file=sys.stderr)
                  return None

          def gh_api_headers():
              h = {"Accept": "application/vnd.github.v3+json", "User-Agent": "CA303-progress-tracker"}
              if GITHUB_TOKEN:
                  h["Authorization"] = f"Bearer {GITHUB_TOKEN}"
              return h

          def build_effective_author_map(author_map, daily_map):
              """Return a copy of author_map extended with any daily_map keys absent from it.

              RepoSense may record commits in authorDailyContributionsMap under a
              git-email alias that is not listed in authorDisplayNameMap.  To avoid
              silently dropping those contributions the missing keys are added here
              using the key itself as the display name.
              """
              effective = dict(author_map)
              for k in daily_map:
                  if k not in effective:
                      effective[k] = k
              return effective

          def count_tracked_chars_via_diffs(org, repo_name, author_map, daily_map, since_iso="", until_iso=""):
              """Count net non-whitespace chars contributed by each author in tracked files.

              Clones the repository with a blobless filter and runs:

                  git show --no-color --format=tformat: -U0 <sha>

              for every commit in RepoSense's authorDailyContributionsMap.  For each
              commit, inserted lines ('+') are counted positively and deleted lines
              ('-') are counted negatively, giving a **net** contribution per author.
              The final per-author total is floored at zero.

              This metric satisfies two key constraints:

              1. **No gaming via delete-then-readd**: if an author adds 100 chars,
                 deletes them, and re-adds them, the net is still 100 (not 200),
                 because their own deletions subtract from their own insertions.

              2. **Fair credit for original drafts**: when a teammate later rewrites
                 an author's section, those deletions appear in the *teammate's*
                 commit — not the original author's.  The original author keeps
                 full credit for what they wrote.

              The -U0 flag eliminates context lines from the diff so that only
              genuinely changed lines are counted.

              - Whitespace characters (spaces, tabs, newlines) are NEVER counted.
              - Files under datos/ are skipped (matches repo-config.csv Ignore Glob).

              Returns: (tracked_per_author: {display_name: int},
                        total_commits: int,
                        commits_per_author: {display_name: int})
              """
              import subprocess
              import tempfile
              IGNORED_PREFIXES = ("datos/",)
              TRACKED_EXTS = (".qmd", ".tex", ".R", ".py", ".cpp")

              effective_author_map = build_effective_author_map(author_map, daily_map)

              def _shas_for_user(username):
                  """Return the set of commit SHAs recorded for username in daily_map."""
                  result = set()
                  for day in daily_map.get(username, []):
                      if not isinstance(day, dict):
                          continue
                      for cr in day.get("commitResults", []):
                          sha = cr.get("hash", "")
                          if sha:
                              result.add(sha)
                  return result

              # Collect commit SHAs with first-seen author attribution.
              # Also count unique commits per author directly from daily_map so every
              # commit is credited even if its lines were later overwritten by a teammate.
              sha_author = {}
              raw_commit_counts = {}
              for username in effective_author_map:
                  user_shas = _shas_for_user(username)
                  raw_commit_counts[username] = len(user_shas)
                  for sha in user_shas:
                      if sha not in sha_author:
                          sha_author[sha] = username

              # Supplement with GitHub API commits to capture any commits that RepoSense
              # missed because the committer's git email is not configured as an author
              # alias in RepoSense.  The GitHub API returns author.login (the GitHub
              # username) for every commit regardless of the git email used.
              if since_iso or until_iso:
                  since_param = (since_iso + "Z") if since_iso and not since_iso.endswith("Z") else since_iso
                  until_param = (until_iso + "Z") if until_iso and not until_iso.endswith("Z") else until_iso
                  api_page = 1
                  while True:
                      api_url = (
                          f"https://api.github.com/repos/{org}/{repo_name}/commits"
                          f"?per_page=100&page={api_page}"
                          + (f"&since={since_param}" if since_param else "")
                          + (f"&until={until_param}" if until_param else "")
                      )
                      api_data = fetch_json(api_url, headers=gh_api_headers())
                      if not api_data or not isinstance(api_data, list):
                          break
                      for commit in api_data:
                          sha = commit.get("sha", "")
                          login = (commit.get("author") or {}).get("login", "")
                          if sha and login and login in effective_author_map and sha not in sha_author:
                              sha_author[sha] = login
                              raw_commit_counts[login] = raw_commit_counts.get(login, 0) + 1
                      if len(api_data) < 100:
                          break
                      api_page += 1

              char_counts = {u: 0 for u in effective_author_map}
              total_commits = len(sha_author)
              # Pre-compute display-name-keyed commit counts used in all return paths.
              commits_per_author = {effective_author_map[u]: raw_commit_counts[u] for u in effective_author_map}

              if not sha_author:
                  return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, 0, commits_per_author

              clone_url = f"https://github.com/{org}/{repo_name}.git"
              # Inject credentials via git config environment variables so the token
              # never appears in command-line arguments or captured stderr output.
              clone_env = dict(os.environ)
              # Skip LFS smudge so repos whose LFS budget is exceeded still clone
              # successfully.  We only need diff content for tracked text extensions
              # (.qmd, .tex, .R, .py, .cpp) which are never stored in LFS.
              clone_env["GIT_LFS_SKIP_SMUDGE"] = "1"
              if GITHUB_TOKEN:
                  import base64
                  b64 = base64.b64encode(
                      f"x-access-token:{GITHUB_TOKEN}".encode()
                  ).decode()
                  clone_env.update({
                      "GIT_CONFIG_COUNT": "1",
                      "GIT_CONFIG_KEY_0": "http.https://github.com/.extraheader",
                      "GIT_CONFIG_VALUE_0": f"AUTHORIZATION: basic {b64}",
                  })

              with tempfile.TemporaryDirectory() as tmpdir:
                  try:
                      clone_result = subprocess.run(
                          ["git", "clone", "--filter=blob:none", clone_url, tmpdir],
                          capture_output=True, timeout=120, env=clone_env,
                      )
                  except subprocess.TimeoutExpired:
                      print(f"Warning: clone of {org}/{repo_name} timed out", file=sys.stderr)
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits, commits_per_author
                  except Exception as e:
                      print(f"Warning: clone of {org}/{repo_name} failed: {e}", file=sys.stderr)
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits, commits_per_author
                  if clone_result.returncode != 0:
                      print(
                          f"Warning: could not clone {org}/{repo_name}: "
                          f"{clone_result.stderr.decode(errors='replace').strip()}",
                          file=sys.stderr,
                      )
                      return {effective_author_map[u]: char_counts[u] for u in effective_author_map}, total_commits, commits_per_author

                  # Build the set of .tex files shadowed by a same-stem .qmd in the
                  # final tree.  If both bitacora_1.tex and bitacora_1.qmd exist in
                  # the repo, ALL diffs for the .tex file are ignored in every commit,
                  # regardless of commit order.  This prevents students from gaming the
                  # character count by committing the .tex first and the .qmd later.
                  shadowed_tex = set()
                  try:
                      _ls_res = subprocess.run(
                          ["git", "-C", tmpdir, "ls-files"],
                          capture_output=True, encoding="utf-8", errors="replace",
                          timeout=30, env=clone_env,
                      )
                      if _ls_res.returncode == 0:
                          _all_files = set(_ls_res.stdout.splitlines())
                          for _f in _all_files:
                              if _f.endswith(".tex"):
                                  if (os.path.splitext(_f)[0] + ".qmd") in _all_files:
                                      shadowed_tex.add(_f)
                          if shadowed_tex:
                              print(
                                  f"Info: {len(shadowed_tex)} .tex file(s) shadowed by "
                                  f".qmd in {org}/{repo_name}: {sorted(shadowed_tex)}",
                                  file=sys.stderr,
                              )
                  except Exception as _ls_e:
                      print(
                          f"Warning: git ls-files for {org}/{repo_name} failed: {_ls_e}",
                          file=sys.stderr,
                      )

                  # Scan git log to find commits whose author email/name was not
                  # captured by RepoSense or the GitHub API supplement above.
                  # Strategy:
                  #   1. Direct email-key match: if the commit email equals a key in
                  #      effective_author_map, attribute it to that author.
                  #   2. Name-token fallback: normalise the git author name and every
                  #      display name (strip accents, lowercase, split into tokens)
                  #      and attribute the commit to the author whose display name
                  #      shares the most tokens (≥ 2 matches, ≥ 40 % overlap).
                  _gl_cmd = [
                      "git", "-C", tmpdir, "log",
                      "--format=%H|%ae|%an", "--no-merges",
                  ]
                  if since_iso:
                      _gl_cmd.append(f"--after={since_iso[:10]}")
                  if until_iso:
                      _gl_cmd.append(f"--before={until_iso[:10]}")
                  try:
                      # 120 s matches the clone timeout; git log is faster but large
                      # repos can have many commits so we give it the same headroom.
                      _gl_res = subprocess.run(
                          _gl_cmd, capture_output=True,
                          encoding="utf-8", errors="replace",
                          timeout=120, env=clone_env,
                      )
                      if _gl_res.returncode == 0 and _gl_res.stdout.strip():
                          import unicodedata as _ud

                          def _nrm(s):
                              # Strip accents, lowercase, split on whitespace.
                              # str.split() without args never returns empty strings.
                              n = _ud.normalize("NFD", s.lower())
                              return set(
                                  t for t in
                                  "".join(
                                      c for c in n if _ud.category(c) != "Mn"
                                  ).split()
                                  if t
                              )

                          _email_map = {
                              k.lower(): k
                              for k in effective_author_map
                              if "@" in k
                          }
                          _disp_toks = {
                              u: _nrm(dn)
                              for u, dn in effective_author_map.items()
                          }
                          for _raw in _gl_res.stdout.splitlines():
                              _parts = _raw.strip().split("|", 2)
                              if len(_parts) < 3:
                                  continue
                              _lsha, _lemail, _lname = (
                                  _parts[0], _parts[1].lower(), _parts[2]
                              )
                              if _lsha in sha_author:
                                  continue
                              # 1. direct email-key lookup
                              _matched = _email_map.get(_lemail)
                              # 2. name-token fallback
                              if not _matched:
                                  _gt = _nrm(_lname)
                                  _best_u, _best_sc = None, 0
                                  for _u, _dt in _disp_toks.items():
                                      # Skip if either token set is empty (avoids
                                      # zero-division and meaningless matches).
                                      if len(_dt) == 0 or len(_gt) == 0:
                                          continue
                                      _ov = len(_gt & _dt)
                                      # Require ≥ 2 matching tokens AND Jaccard ≥ 0.4
                                      # to reduce false positives while still catching
                                      # students who omit middle names or use nicknames.
                                      if (
                                          _ov >= 2
                                          and _ov / max(len(_gt), len(_dt)) >= 0.4
                                          and _ov > _best_sc
                                      ):
                                          _best_sc, _best_u = _ov, _u
                                  _matched = _best_u
                              if _matched:
                                  sha_author[_lsha] = _matched
                                  raw_commit_counts[_matched] = (
                                      raw_commit_counts.get(_matched, 0) + 1
                                  )
                                  print(
                                      f"Info: attributed {_lsha[:8]} "
                                      f"({_lemail!r} / {_lname!r}) "
                                      f"→ {effective_author_map[_matched]!r}",
                                      file=sys.stderr,
                                  )
                          # Refresh totals after git-log scan
                          total_commits = len(sha_author)
                          commits_per_author = {
                              effective_author_map[u]: raw_commit_counts.get(u, 0)
                              for u in effective_author_map
                          }
                  except Exception as _gl_e:
                      print(
                          f"Warning: git log scan for {org}/{repo_name} "
                          f"failed: {_gl_e}",
                          file=sys.stderr,
                      )

                  for sha, username in sha_author.items():
                      try:
                          diff_result = subprocess.run(
                              ["git", "-C", tmpdir, "show",
                               "--no-color", "--format=tformat:", "-U0", sha],
                              capture_output=True,
                              encoding="utf-8", errors="replace", timeout=60,
                              env=clone_env,
                          )
                          if diff_result.returncode != 0:
                              print(
                                  f"Warning: git show {sha} failed: "
                                  f"{diff_result.stderr.strip()}",
                                  file=sys.stderr,
                              )
                              continue
                          current_file_tracked = False
                          for line in diff_result.stdout.splitlines():
                              if line.startswith("diff --git "):
                                  current_file_tracked = False
                              elif line.startswith("+++ "):
                                  # "+++ b/path/to/file.qmd" or "+++ /dev/null"
                                  filepath = line[4:]
                                  if filepath.startswith("b/"):
                                      filepath = filepath[2:]
                                  current_file_tracked = (
                                      any(filepath.endswith(ext) for ext in TRACKED_EXTS)
                                      and not any(filepath.startswith(p) for p in IGNORED_PREFIXES)
                                      and filepath not in shadowed_tex
                                  )
                              elif (line.startswith("+") and not line.startswith("+++")
                                      and current_file_tracked):
                                  content = line[1:]
                                  char_counts[username] += sum(
                                      1 for c in content if not c.isspace()
                                  )
                              elif (line.startswith("-") and not line.startswith("---")
                                      and current_file_tracked):
                                  content = line[1:]
                                  char_counts[username] -= sum(
                                      1 for c in content if not c.isspace()
                                  )
                      except subprocess.TimeoutExpired:
                          print(f"Warning: git show {sha} timed out", file=sys.stderr)
                      except Exception as e:
                          print(f"Warning: git show {sha} error: {e}", file=sys.stderr)

              tracked_per_author = {effective_author_map[u]: max(0, char_counts[u]) for u in effective_author_map}
              return tracked_per_author, total_commits, commits_per_author

          def count_insertions(author_daily_map):
              total = 0
              for daily_list in author_daily_map.values():
                  for day in daily_list:
                      if isinstance(day, dict):
                          for cr in day.get("commitResults", []):
                              for ft in cr.get("fileTypesAndContributionMap", {}).values():
                                  total += ft.get("insertions", 0)
              return total

          summary = fetch_json(f"{BASE_URL}/summary.json")
          if summary is None:
              print("ERROR: could not fetch summary.json", file=sys.stderr)
              sys.exit(1)

          generated_time = summary.get("reportGeneratedTime", "N/A")
          since = summary.get("sinceDate", "")[:10]
          until = summary.get("untilDate", "")[:10]
          repos = summary.get("repos", [])

          rows = []
          for repo in repos:
              folder = repo["outputFolderName"]
              group_name = repo["location"]["repoName"]
              org = repo["location"]["organization"]
              repo_url = f"https://github.com/{org}/{group_name}"

              commits_data = fetch_json(f"{BASE_URL}/{folder}/commits.json")
              if commits_data:
                  author_map = commits_data.get("authorDisplayNameMap", {})
                  daily_map = commits_data.get("authorDailyContributionsMap", {})
                  members = list(build_effective_author_map(author_map, daily_map).values())
                  num_insertions = count_insertions(daily_map)
                  # Character-level changes in tracked files (visible chars only, whitespace excluded)
                  tracked_per_author, num_commits, commits_per_author = count_tracked_chars_via_diffs(
                      org, group_name, author_map, daily_map,
                      since_iso=summary.get("sinceDate", ""),
                      until_iso=summary.get("untilDate", ""),
                  )
              else:
                  members = []
                  num_commits = 0
                  num_insertions = 0
                  tracked_per_author = {}
                  commits_per_author = {}

              rows.append({
                  "group": group_name,
                  "repo_url": repo_url,
                  "members": members,
                  "commits": num_commits,
                  "insertions": num_insertions,
                  "tracked_per_author": tracked_per_author,
                  "commits_per_author": commits_per_author,
              })

          # ── Section 1: overall progress table ──────────────────────────────────
          lines = [
              "<!-- REPOSENSE-PROGRESS-START -->",
              "## 📊 Progreso de los grupos",
              "",
              f"> Período: **{since}** → **{until}** · Reporte generado: **{generated_time}**",
              f"> Fuente: [RepoSense Report]({REPOSENSE_SITE})",
              "",
              "| Grupo | Repositorio | Integrantes | Commits | Líneas añadidas |",
              "|-------|-------------|-------------|:-------:|:---------------:|",
          ]

          for row in rows:
              members_str = "<br>".join(row["members"]) if row["members"] else "—"
              lines.append(
                  f"| [{row['group']}]({row['repo_url']}) "
                  f"| [🔗 Ver repo]({row['repo_url']}) "
                  f"| {members_str} "
                  f"| {row['commits']} "
                  f"| {row['insertions']} |"
              )

          lines.append("<!-- REPOSENSE-PROGRESS-END -->")
          progress_block = "\n".join(lines)

          # ── Section 2: per-group QMD tables + competition ranking ────────────
          import math

          def balance_stddev(tracked_map):
              """Population std-dev of member percentage shares (σ).
              Returns None when group has no tracked activity."""
              total = sum(tracked_map.values())
              if total == 0 or len(tracked_map) == 0:
                  return None
              n = len(tracked_map)
              mean_pct = 100.0 / n          # expected percentage per member under equal distribution
              pcts = [v / total * 100 for v in tracked_map.values()]
              return math.sqrt(sum((p - mean_pct) ** 2 for p in pcts) / n)

          def chi_square_balance(tracked_map):
              """Chi-squared goodness-of-fit statistic for equal contribution (H0).
              χ² = Σ (Oᵢ − E)² / E  where E = total / n.
              Returns (stat, df) or (None, None) when no activity / fewer than 2 members."""
              total = sum(tracked_map.values())
              n = len(tracked_map)
              if total == 0 or n < 2:
                  return None, None
              expected = total / n
              stat = sum((obs - expected) ** 2 / expected for obs in tracked_map.values())
              return stat, n - 1

          def gini_balance(tracked_map):
              """Gini coefficient of contributions (G ∈ [0, 1]).
              G = 0: perfect equality; G = 1: one member does all the work.
              Formula (sorted ascending): G = 2·Σ(i·xᵢ) / (n·T) − (n+1)/n
              Returns None when group has no tracked activity."""
              values = list(tracked_map.values())
              total = sum(values)
              n = len(values)
              if total == 0 or n == 0:
                  return None
              values_sorted = sorted(values)
              numerator = sum((i + 1) * x for i, x in enumerate(values_sorted))
              return 2 * numerator / (n * total) - (n + 1) / n

          def _gammainc_lower_series(a, x, max_iter=300, tol=1e-12):
              """Lower regularized incomplete gamma P(a,x) via series expansion."""
              if abs(x) < 1e-15:
                  return 0.0
              term = 1.0 / a
              total = term
              for n in range(1, max_iter + 1):
                  term *= x / (a + n)
                  total += term
                  if abs(term) < tol * abs(total):
                      break
              return math.exp(-x + a * math.log(x) - math.lgamma(a + 1)) * total

          def _gammaincc_cf(a, x, max_iter=300, tol=1e-12):
              """Upper regularized incomplete gamma Q(a,x) via Lentz continued fraction."""
              TINY = 1e-30
              b = x + 1.0 - a
              c = 1.0 / TINY
              d = 1.0 / (b if abs(b) > TINY else TINY)
              h = d
              for i in range(1, max_iter + 1):
                  an = -i * (i - a)
                  b += 2.0
                  d = an * d + b
                  if abs(d) < TINY: d = TINY
                  c = b + an / c
                  if abs(c) < TINY: c = TINY
                  d = 1.0 / d
                  delta = d * c
                  h *= delta
                  if abs(delta - 1.0) < tol:
                      break
              return math.exp(-x + a * math.log(x) - math.lgamma(a)) * h

          def chi2_pvalue(stat, df):
              """Upper-tail p-value: P(χ² > stat | df) using pure Python."""
              if stat is None or df is None or df < 1:
                  return None
              if stat < 1e-15:
                  return 1.0
              a = df / 2.0
              x = stat / 2.0
              if x < a + 1.0:
                  return 1.0 - _gammainc_lower_series(a, x)
              return _gammaincc_cf(a, x)

          qmd_lines = [
              "<!-- REPOSENSE-QMD-START -->",
              "## 📝 Caracteres modificados en archivos de proyecto por integrante",
              "",
              f"> Período: **{since}** → **{until}** · Reporte generado: **{generated_time}**",
              f"> Archivos rastreados: `.qmd`, `.tex`, `.R`, `.py`, `.cpp` · Métrica: contribución neta de caracteres visibles = (líneas `+` − líneas `-`) por integrante en sus commits del período, sin espacios, mínimo 0",
              "",
          ]

          for row in rows:
              tracked_map = row["tracked_per_author"]
              commits_map = row.get("commits_per_author", {})
              group_total = sum(tracked_map.values())

              qmd_lines.append(f"### {row['group']}")
              qmd_lines.append("")
              qmd_lines.append("| Integrante | Commits | Caracteres | Caracteres % |")
              qmd_lines.append("|------------|:-------:|:----------:|:------------:|")

              for name, count in tracked_map.items():
                  pct_str = f"{count/group_total*100:.1f}%" if group_total > 0 else "—"
                  n_commits = commits_map.get(name, 0)
                  qmd_lines.append(f"| {name} | {n_commits} | {count} | {pct_str} |")

              qmd_lines.append("")

          # ── Competition ranking ────────────────────────────────────────────────
          # Compute per-group stats
          group_stats = []
          for row in rows:
              tracked_map = row["tracked_per_author"]
              total_tracked = sum(tracked_map.values())
              chi2_stat, chi2_df = chi_square_balance(tracked_map)
              pvalue = chi2_pvalue(chi2_stat, chi2_df)
              group_stats.append({
                  "group": row["group"],
                  "repo_url": row["repo_url"],
                  "total_tracked": total_tracked,
                  "sigma": balance_stddev(tracked_map),
                  "gini": gini_balance(tracked_map),
                  "chi2": chi2_stat,
                  "chi2_df": chi2_df,
                  "pvalue": pvalue,
                  "rank_total": None,
                  "rank_sigma": None,
                  "rank_gini": None,
                  "rank_chi2": None,
                  "score": None,
              })

          active = [g for g in group_stats if g["total_tracked"] > 0]
          inactive = [g for g in group_stats if g["total_tracked"] == 0]
          n_active = len(active)
          last_rank = n_active + 1

          for rank, g in enumerate(sorted(active, key=lambda x: -x["total_tracked"]), 1):
              g["rank_total"] = rank
          for rank, g in enumerate(sorted(active, key=lambda x: x["sigma"]), 1):
              g["rank_sigma"] = rank
          for rank, g in enumerate(sorted(active, key=lambda x: x["gini"]), 1):
              g["rank_gini"] = rank
          for rank, g in enumerate(sorted(active, key=lambda x: x["chi2"]), 1):
              g["rank_chi2"] = rank
          for g in inactive:
              for key in ("rank_total", "rank_sigma", "rank_gini", "rank_chi2"):
                  g[key] = last_rank

          for g in group_stats:
              # Primary score: volume rank + Gini-balance rank (lower = better).
              # σ rank and χ² rank are shown as independent cross-checks.
              g["score"] = (g["rank_total"] + g["rank_gini"]) if g["total_tracked"] > 0 else float("inf")

          # Tie-breaker: at equal score, the group with lower Gini (more balanced
          # contributions) wins, favouring teams whose members work more evenly.
          ranked = sorted(group_stats, key=lambda x: (x["score"], x["gini"] if x["gini"] is not None else float("inf")))
          winner_id = ranked[0]["group"] if ranked and ranked[0]["total_tracked"] > 0 else None

          qmd_lines.append("### 🏆 Grupo ganador de puntos extra (5 puntos para cada integrante)")
          qmd_lines.append("")
          qmd_lines.append(
              "> **Criterio de victoria**: El equipo que tenga al final del semestre el mayor total de "
              "**contribución neta de caracteres** (suma de (líneas `+`) − (líneas `−`) por integrante en sus propios commits "
              "sobre archivos `.qmd`, `.tex`, `.R`, `.py` y `.cpp` durante el período, mínimo 0 por integrante) "
              "**y** distribución más equilibrada entre sus integrantes. "
              "Cada integrante recibe crédito por todo el texto que escribió; borrar y reinsertar el mismo contenido no infla el conteo porque las eliminaciones propias se descuentan.  ")
          qmd_lines.append(
              "> **Puntaje** = Rango volumen + Rango G (Gini, menor = mejor). "
              "Las columnas σ, χ² y p-valor son métricas independientes de verificación.  ")
          qmd_lines.append("> 🏆 indica el grupo ganador.")
          qmd_lines.append("")
          qmd_lines.append("**IMPORTANTE:** Para ganar esto hay que tener constancia. Un grupo en el cual un solo integrante tiene 100% durante 3 meses, será muy difícil que gane, ya que el resto del equipo tendrá que recuperar la cantidad de líneas en el último mes.")
          qmd_lines.append("")
          qmd_lines.append("")
          qmd_lines.append("**El truco para ganar es mantenerse en los primeros lugares durante todo el semestre**.")
          qmd_lines.append("")
          qmd_lines.append("")
          qmd_lines.append(
              "| Pos. | Grupo | Total caracteres | Rango vol. | Gini | Rango G | σ balance | Rango σ | χ² bondad | p-valor | Rango χ² | Puntaje | |"
          )
          qmd_lines.append(
              "|:----:|-------|:----------------:|:----------:|:----:|:-------:|:---------:|:-------:|:---------:|:-------:|:--------:|:-------:|:-:|"
          )

          medals = {1: "🥇", 2: "🥈", 3: "🥉"}
          for pos, g in enumerate(ranked, 1):
              medal = medals.get(pos, str(pos))
              is_winner = winner_id is not None and g["group"] == winner_id
              trophy = "🏆" if is_winner else ""
              gini_str  = f"{g['gini']:.3f}"  if g["gini"]  is not None else "—"
              sigma_str = f"{g['sigma']:.2f}" if g["sigma"] is not None else "—"
              chi2_str  = f"{g['chi2']:.2f}"  if g["chi2"]  is not None else "—"
              pval = g["pvalue"]
              if pval is None:
                  pval_str = "—"
              elif pval < 0.001:
                  pval_str = f"{pval:.2e}"
              else:
                  pval_str = f"{pval:.3f}"
              rank_t  = str(g["rank_total"]) if g["rank_total"] != last_rank else "—"
              rank_g  = str(g["rank_gini"])  if g["rank_gini"]  != last_rank else "—"
              rank_s  = str(g["rank_sigma"]) if g["rank_sigma"] != last_rank else "—"
              rank_c  = str(g["rank_chi2"])  if g["rank_chi2"]  != last_rank else "—"
              score_str = str(g["score"]) if g["score"] != float("inf") else "—"
              qmd_lines.append(
                  f"| {medal} | [{g['group']}]({g['repo_url']}) "
                  f"| {g['total_tracked']} "
                  f"| {rank_t} "
                  f"| {gini_str} "
                  f"| {rank_g} "
                  f"| {sigma_str} "
                  f"| {rank_s} "
                  f"| {chi2_str} "
                  f"| {pval_str} "
                  f"| {rank_c} "
                  f"| {score_str} "
                  f"| {trophy} |"
              )

          qmd_lines.append("")
          qmd_lines.append("---")
          qmd_lines.append("")
          qmd_lines.append("#### 🗺️ Guía de columnas")
          qmd_lines.append("")
          qmd_lines.append(
              "La siguiente tabla explica cada columna del ranking para que puedas "
              "interpretar exactamente cómo fue evaluado tu grupo.")
          qmd_lines.append("")
          qmd_lines.append("| Columna | Qué mide | Cómo leerla | Mejor valor |")
          qmd_lines.append("|---------|----------|-------------|-------------|")
          qmd_lines.append(
              "| **Pos.** | Posición final en el ranking (🥇🥈🥉…) | "
              "Determinada por el Puntaje; a igual Puntaje gana el grupo con menor σ balance (distribución más equilibrada entre sus integrantes) | "
              "🥇 (posición 1) |")
          qmd_lines.append(
              "| **Grupo** | Nombre del grupo con enlace al repositorio | "
              "Clic para ver el repo directamente | — |")
          qmd_lines.append(
              "| **Total caracteres** | Contribución neta de caracteres visibles (no-espacios): suma de (líneas `+`) − (líneas `−`) en los commits propios del integrante "
              "sobre archivos `.qmd`, `.tex`, `.R`, `.py` y `.cpp` durante el período, mínimo 0. "
              "Borrar y reinsertar el mismo contenido no infla el conteo: las eliminaciones propias se descuentan. | "
              "Más caracteres = mayor contribución neta | Mayor |")
          qmd_lines.append(
              "| **Rango vol.** | Posición del grupo ordenado de mayor a menor Total caracteres | "
              "1 = grupo con más caracteres escritos; — = grupo sin actividad | 1 |")
          qmd_lines.append(
              "| **Gini** | Coeficiente de Gini de las contribuciones de los integrantes (G ∈ [0, 1]) | "
              "0 = todos aportaron exactamente lo mismo; 1 = un solo integrante lo hizo todo | 0 |")
          qmd_lines.append(
              "| **Rango G** | Posición del grupo ordenado de menor a mayor Gini (más equilibrado primero) | "
              "1 = distribución más igualitaria; — = grupo sin actividad | 1 |")
          qmd_lines.append(
              "| **σ balance** | Desviación estándar de los porcentajes de contribución de cada integrante | "
              "0 = todos aportaron exactamente lo mismo; valores mayores indican mayor desequilibrio | 0 |")
          qmd_lines.append(
              "| **Rango σ** | Posición del grupo ordenado de menor a mayor σ (más equilibrado primero) | "
              "Métrica de verificación independiente; idealmente coincide con Rango G | 1 |")
          qmd_lines.append(
              "| **χ² bondad** | Estadístico chi-cuadrado de bondad de ajuste (H₀: distribución uniforme) | "
              "0 = aporte perfectamente igualitario; valores altos indican desequilibrio. "
              "**Ojo:** no es comparable entre grupos de diferente volumen total | 0 |")
          qmd_lines.append(
              "| **p-valor** | Probabilidad de observar un χ² tan extremo o mayor si el reparto fuera uniforme | "
              "p > 0.05 → no se rechaza H₀ (equilibrado); "
              "p ≤ 0.05 → evidencia de desequilibrio; "
              "p ≤ 0.01 → evidencia fuerte; "
              "p ≤ 0.001 → evidencia muy fuerte | > 0.05 |")
          qmd_lines.append(
              "| **Rango χ²** | Posición del grupo ordenado de menor a mayor χ² (más equilibrado primero) | "
              "Métrica de verificación independiente; idealmente coincide con Rango G | 1 |")
          qmd_lines.append(
              "| **Puntaje** | Rango vol. + Rango G | "
              "Combina volumen y equilibrio Gini en un único número; **menor = mejor**; — = sin actividad | Menor |")
          qmd_lines.append(
              "| **🏆** | Grupo ganador | "
              "Se otorga al grupo con el menor Puntaje (y, en caso de empate, menor Gini) | 🏆 |")
          qmd_lines.append("")
          qmd_lines.append(
              "> **Nota sobre `—`:** el guion indica que el grupo no tiene contribución neta de caracteres en archivos "
              "`.qmd`, `.tex`, `.R`, `.py` o `.cpp` durante el período analizado y por tanto no participa en el ranking de volumen ni balance.")
          qmd_lines.append("")
          qmd_lines.append("---")
          qmd_lines.append("")
          qmd_lines.append("#### 📐 Metodología de las métricas de equilibrio")
          qmd_lines.append("")
          qmd_lines.append(
              "Se utilizan **tres métricas independientes** para medir cuán equitativamente "
              "cada grupo reparte las contribuciones entre sus integrantes. "
              "Todas tienen como hipótesis nula que todos los miembros aportan exactamente "
              "la misma **contribución neta de caracteres visibles** en archivos `.qmd`, `.tex`, `.R`, `.py` y `.cpp` "
              "(espacios en blanco excluidos).")
          qmd_lines.append("")
          qmd_lines.append("**0. Definición de Oᵢ — contribución neta de caracteres visibles (git show)**")
          qmd_lines.append("")
          qmd_lines.append(
              "El repositorio se clona localmente con filtro blobless y se ejecuta "
              "`git show --format=tformat: -U0 <sha>` sobre cada commit del período en archivos rastreados. "
              "La opción `-U0` elimina las líneas de contexto del diff (0 líneas de contexto), "
              "de modo que solo se cuentan las líneas realmente modificadas. "
              "Por cada commit de un integrante, se suman los caracteres visibles (no-espacios) "
              "de las líneas insertadas (`+`) y se restan los de las líneas eliminadas (`-`). "
              "La suma acumulada por integrante se ajusta a cero si resultara negativa. "
              "Caracteres contabilizados:")
          qmd_lines.append("")
          qmd_lines.append(
              "- **Líneas insertadas `+`**: se suman los chars no-espacios de esa línea.")
          qmd_lines.append(
              "- **Líneas eliminadas `−`**: se restan los chars no-espacios de esa línea.")
          qmd_lines.append("")
          qmd_lines.append(
              "Oᵢ = max(0, Σ chars_insertados − Σ chars_eliminados) sobre todos los commits del integrante "
              "en el período. Esta fórmula satisface dos propiedades clave:")
          qmd_lines.append("")
          qmd_lines.append(
              "- **Sin arbitraje por borrar-y-reinsertar**: si un integrante añade 100 chars, los borra "
              "y los vuelve a añadir, el neto sigue siendo 100, no 200.")
          qmd_lines.append(
              "- **Crédito por borradores originales**: cuando un compañero reescribe el texto de otro, "
              "las eliminaciones aparecen en el commit del compañero (no del autor original). "
              "El autor original conserva el crédito por lo que escribió.")
          qmd_lines.append("")
          qmd_lines.append("**1. Desviación estándar de porcentajes (σ)**")
          qmd_lines.append("")
          qmd_lines.append(
              "Convierte las contribuciones netas de caracteres visibles (`.qmd` + `.tex` + `.R` + `.py` + `.cpp`) en porcentajes "
              "(pᵢ = Oᵢ / T × 100) "
              "y calcula la desviación estándar poblacional respecto a la media teórica "
              "de contribución igualitaria (100 / n):")
          qmd_lines.append("")
          qmd_lines.append(
              "$$\\sigma = \\sqrt{\\frac{1}{n}\\sum_{i=1}^{n}\\left(p_i - \\frac{100}{n}\\right)^2}$$")
          qmd_lines.append("")
          qmd_lines.append(
              "σ = 0 significa contribución perfectamente igualitaria; "
              "σ = 100 · (n−1)/n · 1/√n corresponde al caso extremo donde un solo integrante "
              "hace todo el trabajo. **Menor σ = mejor equilibrio.**")
          qmd_lines.append("")
          qmd_lines.append("**2. Coeficiente de Gini (G)**")
          qmd_lines.append("")
          qmd_lines.append(
              "Ordena las contribuciones netas de menor a mayor (x₍₁₎ ≤ x₍₂₎ ≤ … ≤ x₍ₙ₎) y aplica la fórmula:")
          qmd_lines.append("")
          qmd_lines.append(
              "$$G = \\frac{2\\sum_{i=1}^{n} i\\, x_{(i)}}{n \\sum_{i=1}^{n} x_{(i)}} - \\frac{n+1}{n}$$")
          qmd_lines.append("")
          qmd_lines.append(
              "G ∈ [0, 1]: G = 0 indica contribución perfectamente igualitaria; G = 1 indica que un único integrante concentra toda la producción. "
              "A diferencia de σ, el coeficiente de Gini es **invariante a escala** (no depende del volumen total ni del número de integrantes), "
              "lo que lo hace directamente comparable entre grupos de distinto tamaño. "
              "**Es la métrica principal del puntaje final. Menor G = mejor equilibrio.**")
          qmd_lines.append("")
          qmd_lines.append("**3. Prueba chi-cuadrado de bondad de ajuste (χ²)**")
          qmd_lines.append("")
          qmd_lines.append(
              "Compara las contribuciones netas observadas de caracteres visibles (Oᵢ) contra los esperados bajo distribución "
              "uniforme (E = T / n, donde T = total de caracteres del grupo y n = número de integrantes):")
          qmd_lines.append("")
          qmd_lines.append(
              "$$\\chi^2 = \\sum_{i=1}^{n}\\frac{(O_i - E)^2}{E}, \\quad E = \\frac{T}{n}, \\quad gl = n-1$$")
          qmd_lines.append("")
          qmd_lines.append(
              "El **p-valor** es la probabilidad de observar un estadístico tan extremo o más "
              "asumiendo H₀ (distribución uniforme): "
              "p = P(χ² > estadístico | gl). "
              "Se calcula mediante la función gamma incompleta superior regularizada Q(gl/2, estadístico/2):")
          qmd_lines.append("")
          qmd_lines.append(
              "$$p = Q\\!\\left(\\frac{gl}{2},\\,\\frac{\\chi^2}{2}\\right) "
              "= \\frac{\\Gamma(gl/2,\\;\\chi^2/2)}{\\Gamma(gl/2)}$$")
          qmd_lines.append("")
          qmd_lines.append(
              "**Interpretación del p-valor:** p > 0.05 no rechaza H₀ (distribución equilibrada); "
              "p ≤ 0.05 indica evidencia de desequilibrio. "
              "χ² = 0 indica distribución perfectamente igualitaria. "
              "A diferencia de G (Gini), χ² **no** está normalizado por el volumen total, "
              "por lo que grupos con más caracteres en total pueden obtener χ² más alto "
              "aunque su distribución sea más equilibrada en términos relativos. "
              "El p-valor corrige parcialmente este sesgo al escalar internamente por E. "
              "Por eso ambas (χ², p-valor) se usan como **verificación independiente** y no como métrica principal. "
              "**Menor χ² (mayor p-valor) = mejor equilibrio** (dentro del mismo tamaño de grupo).")
          qmd_lines.append("")
          qmd_lines.append(
              "**Combinación de rangos:** El puntaje final es "
              "`Rango vol. + Rango G`. Si el Rango σ y el Rango χ² coinciden con el Rango G "
              "y el p-valor confirma rechazo/aceptación de H₀, "
              "el resultado queda verificado por las tres métricas. "
              "**Desempate:** si dos grupos tienen el mismo Puntaje, gana el que tenga menor Gini (menor concentración de contribuciones), "
              "favoreciendo así a los equipos cuyos integrantes trabajan de forma más equilibrada.")
          qmd_lines.append("")
          qmd_lines.append("<!-- REPOSENSE-QMD-END -->")
          qmd_block = "\n".join(qmd_lines)

          # ── Write both sections to README ──────────────────────────────────────
          readme_path = "README.md"
          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          def replace_or_append(text, start_marker, end_marker, new_block):
              s = text.find(start_marker)
              e = text.find(end_marker)
              if s != -1 and e != -1:
                  return text[:s] + new_block + text[e + len(end_marker):]
              return text.rstrip("\n") + "\n\n" + new_block + "\n"

          content = replace_or_append(
              content,
              "<!-- REPOSENSE-PROGRESS-START -->",
              "<!-- REPOSENSE-PROGRESS-END -->",
              progress_block,
          )
          content = replace_or_append(
              content,
              "<!-- REPOSENSE-QMD-START -->",
              "<!-- REPOSENSE-QMD-END -->",
              qmd_block,
          )

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(content)

          # ── Write full ranking block to profile/README.md ─────────────────────
          import os
          os.makedirs("profile", exist_ok=True)

          # Reuse the full qmd_block, replacing its markers with the profile markers
          # so that the complete ranking, column guide and methodology appear on the
          # organisation profile page.
          profile_block = (
              qmd_block
              .replace("<!-- REPOSENSE-QMD-START -->", "<!-- REPOSENSE-PROFILE-START -->", 1)
              .replace("<!-- REPOSENSE-QMD-END -->",   "<!-- REPOSENSE-PROFILE-END -->",   1)
          )

          profile_path = "profile/README.md"
          with open(profile_path, "r", encoding="utf-8") as f:
              profile_content = f.read()
          profile_content = replace_or_append(
              profile_content,
              "<!-- REPOSENSE-PROFILE-START -->",
              "<!-- REPOSENSE-PROFILE-END -->",
              profile_block,
          )
          with open(profile_path, "w", encoding="utf-8") as f:
              f.write(profile_content)

          print("README.md and profile/README.md updated successfully.")
          EOF

      - name: Commit and push changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md profile/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: actualizar progreso de grupos [skip ci]"
            git pull --rebase origin main
            git push
          fi
